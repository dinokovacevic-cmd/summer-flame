<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Summer Flame — Staff (daily code)</title>
<meta name="theme-color" content="#0a0d16" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="SF Staff" />
<link rel="manifest" href="manifest-radnik.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0a0d16; --panel:#141b2e; --panel2:#1a2440; --line:#26314f; --line2:#32406a;
  --text:#f3efe3; --muted:#9aa6c0; --muted2:#6b779a;
  --gold:#e9c46a; --gold2:#f7e2a6; --gold-deep:#b8892b; --accent:#3da0ff;
  --r:16px; --r2:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,system-ui,sans-serif;
  --disp:'Rajdhani',var(--font); --serif:'Cinzel',Georgia,serif;
  --fire:linear-gradient(120deg,#ffb020 0%,#ff5a2c 48%,#ff2e63 100%);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--text);min-height:100vh;min-height:100dvh;
  background:radial-gradient(1000px 600px at 50% -10%,#141d33,#0a0d16 60%)}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
button{font-family:var(--font);cursor:pointer}
.hidden{display:none !important}

.top{display:flex;align-items:center;gap:10px;padding:calc(16px + env(safe-area-inset-top)) 18px 14px;border-bottom:1px solid var(--line)}
.top .crest{width:30px;height:30px}
.top .t{font-family:var(--serif);color:var(--gold);font-size:15px;letter-spacing:.06em;line-height:1}
.top .t small{display:block;color:var(--muted2);font-family:var(--font);font-size:10px;letter-spacing:.16em;margin-top:3px}
.top .role{margin-left:auto;font-family:var(--disp);font-size:11px;letter-spacing:.14em;color:var(--accent);border:1px solid rgba(61,160,255,.4);padding:5px 10px;border-radius:999px}

.wrap{flex:1;padding:20px 18px calc(24px + env(safe-area-inset-bottom))}

/* code screen */
.venue-line{display:flex;align-items:center;gap:9px;justify-content:center;color:var(--muted);font-size:14px;margin-bottom:4px}
.venue-line .fl{font-size:20px}
.date-line{text-align:center;color:var(--muted2);font-size:12.5px;font-family:var(--disp);letter-spacing:.06em;margin-bottom:22px}
.code-card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:24px;
  padding:34px 20px 30px;text-align:center;position:relative;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.code-card::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--fire)}
.code-lbl{font-family:var(--disp);letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:var(--muted2)}
.code{font-family:var(--disp);font-weight:700;font-size:82px;line-height:1;letter-spacing:.16em;margin:14px 0 6px;
  background:linear-gradient(180deg,var(--gold2),var(--gold-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 4px 24px rgba(233,196,106,.18)}
.code-help{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.5}
.instr{margin-top:22px;background:linear-gradient(90deg,rgba(61,160,255,.1),rgba(61,160,255,.03));border:1px solid rgba(61,160,255,.28);
  border-radius:14px;padding:15px 16px}
.instr h3{margin:0 0 8px;font-family:var(--disp);font-size:15px;color:var(--accent);letter-spacing:.04em}
.instr ol{margin:0;padding-left:20px;color:var(--muted);font-size:13px;line-height:1.7}
.instr ol b{color:var(--text)}
.midnight{text-align:center;color:var(--muted2);font-size:11.5px;margin-top:18px}
.change{width:100%;margin-top:16px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);
  border-radius:var(--r2);padding:14px;font-family:var(--disp);font-weight:700;letter-spacing:.05em;font-size:14px}

/* picker */
.pk h2{font-family:var(--serif);color:var(--gold);margin:2px 0 4px;font-size:22px}
.pk p{color:var(--muted);font-size:13px;margin:0 0 12px}
.country{margin-top:12px}
.chead{display:flex;align-items:center;gap:10px;padding:4px 4px 8px}
.chead .flag{font-size:22px}.chead .clabel{font-family:var(--disp);font-weight:700;letter-spacing:.12em;font-size:15px}
.flagsvg{border-radius:3px;box-shadow:0 0 0 1px rgba(255,255,255,.14);display:inline-block;vertical-align:middle;flex:none}
.chead .cname{color:var(--muted2);font-size:12px}
.venue{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 15px;border:1px solid var(--line);
  border-radius:var(--r2);background:var(--panel);margin-bottom:8px}
.venue.sel{border-color:var(--gold);background:linear-gradient(180deg,rgba(233,196,106,.12),rgba(233,196,106,.03))}
.venue .vn{font-weight:600;font-size:15px}.venue .vc{color:var(--muted);font-size:12px;margin-top:2px}
.venue .radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);flex:none}
.venue.sel .radio{border-color:var(--gold);background:radial-gradient(circle at 50% 50%,var(--gold) 40%,transparent 45%)}
.btn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-size:15px;font-weight:700;letter-spacing:.06em;
  font-family:var(--disp);color:#1a1204;margin-top:16px;background:linear-gradient(180deg,var(--gold2),var(--gold-deep));box-shadow:0 10px 26px rgba(233,196,106,.2)}
.btn:active{transform:scale(.98)}.btn:disabled{opacity:.45;box-shadow:none}
</style>
</head>
<body>
<div id="app"></div>
<!-- Zajednička logika INLINE (isti popis poslovnica i kod kao index.html).
     Ako mijenjaš popis poslovnica, promijeni ISTI blok i u index.html. -->
<script>
"use strict";
const FF_COUNTRIES = [
  { code:"HR", label:"CRO", name:"Croatia", flag:"🇭🇷", venues:[
    { id:"kvatric",        name:"FF Kvatrić",        city:"Zagreb" },
    { id:"dubrava",        name:"FF Dubrava",        city:"Zagreb" },
    { id:"point",          name:"FF Point",          city:"Zagreb" },
    { id:"osijek",         name:"FF Osijek",         city:"Osijek" },
    { id:"slavonski-brod", name:"FF Slavonski Brod", city:"Slavonski Brod" },
    { id:"split",          name:"FF Split",          city:"Split" },
    { id:"split-joker",    name:"FF Split Joker",    city:"Split" },
    { id:"zadar",          name:"FF Zadar",          city:"Zadar" },
    { id:"koprivnica",     name:"FF Koprivnica",     city:"Koprivnica" },
  ]},
  { code:"BA", label:"BIH", name:"Bosnia & Herzegovina", flag:"🇧🇦", venues:[
    { id:"mepas",      name:"FF Mepas Mall", city:"Mostar" },
    { id:"zenica",     name:"FF Zenica",     city:"Zenica" },
    { id:"sarajevo",   name:"FF Sarajevo",   city:"Sarajevo" },
    { id:"banja-luka", name:"FF Banja Luka", city:"Banja Luka" },
    { id:"tuzla",      name:"FF Tuzla",      city:"Tuzla" },
  ]},
  { code:"AT", label:"AUT", name:"Austria", flag:"🇦🇹", venues:[
    { id:"millennium-city", name:"FF Millennium City", city:"Beč" },
    { id:"lugner-city",     name:"FF Lugner City",     city:"Beč" },
  ]},
  { code:"SI", label:"SLO", name:"Slovenia", flag:"🇸🇮", venues:[
    { id:"ljubljana", name:"FF Ljubljana", city:"Ljubljana" },
    { id:"maribor",   name:"FF Maribor",   city:"Maribor" },
  ]},
  { code:"NL", label:"NED", name:"Netherlands", flag:"🇳🇱", venues:[
    { id:"alexandrium", name:"FF Alexandrium", city:"Rotterdam" },
  ]},
];
function ffAllVenues(){ const out=[]; for(const c of FF_COUNTRIES) for(const v of c.venues) out.push({...v,country:c.code,countryName:c.name,flag:c.flag,label:c.label}); return out; }
function ffVenueById(id){ return ffAllVenues().find(v=>v.id===id)||null; }
function ffFlag(code){
  const F={
    HR:'<rect width="24" height="16" fill="#fff"/><rect width="24" height="5.34" fill="#d81e05"/><rect y="10.66" width="24" height="5.34" fill="#0f1a8a"/>',
    AT:'<rect width="24" height="16" fill="#fff"/><rect width="24" height="5.34" fill="#ed2939"/><rect y="10.66" width="24" height="5.34" fill="#ed2939"/>',
    SI:'<rect width="24" height="16" fill="#fff"/><rect y="5.34" width="24" height="5.34" fill="#005da4"/><rect y="10.66" width="24" height="5.34" fill="#ed1c24"/>',
    NL:'<rect width="24" height="16" fill="#fff"/><rect width="24" height="5.34" fill="#ae1c28"/><rect y="10.66" width="24" height="5.34" fill="#21468b"/>',
    BA:'<rect width="24" height="16" fill="#002395"/><polygon points="7,0 22,0 22,16" fill="#fecb00"/><g fill="#fff"><circle cx="11" cy="4" r="1"/><circle cx="14" cy="8" r="1"/><circle cx="17" cy="12" r="1"/></g>',
  };
  return `<svg class="flagsvg" viewBox="0 0 24 16" width="24" height="16" aria-hidden="true">${F[code]||""}</svg>`;
}
const FF_CODE_SECRET = "FF-SUMMER-FLAME-2026";
function ffDateStr(d){ const x=d||new Date(); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; }
function ffToday(){ return ffDateStr(new Date()); }
function ffDailyCode(venueId,dateStr){
  const s=`${FF_CODE_SECRET}|${venueId}|${dateStr||ffToday()}`;
  let h=0x811c9dc5;
  for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,0x01000193)>>>0; }
  return String(h%10000).padStart(4,"0");
}
</script>
<script>
"use strict";
const RKEY="ff_summer_flame_worker_v1";
const EN_DOW=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const EN_MON=["January","February","March","April","May","June","July","August","September","October","November","December"];
const el=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function crest(sz){return `<svg class="crest" width="${sz}" height="${sz}" viewBox="0 0 100 100" fill="none">
  <circle cx="50" cy="50" r="46" stroke="url(#g1)" stroke-width="2.5"/>
  <path d="M50 24c3 7-1.4 10-4.6 13.6C41.6 41.8 39 45.6 39 50.6a11 11 0 0 0 22 .4c0-3.7-1.8-6.6-3.8-9.2-.7 2.3-2.2 3.8-4.2 4.3 1.8-4.8 1.3-11-3-15.5-.6-.7-1.4-1.4-2-2.6z" fill="url(#g2)"/>
  <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7e2a6"/><stop offset="1" stop-color="#b8892b"/></linearGradient>
  <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffd76a"/><stop offset="1" stop-color="#ff5a2c"/></linearGradient></defs></svg>`;}
function loadVenue(){ try{ return localStorage.getItem(RKEY)||null; }catch(e){ return null; } }
function saveVenue(id){ try{ localStorage.setItem(RKEY,id); }catch(e){ /* private mod: samo se neće zapamtiti izbor */ } }

function shell(inner){
  el("app").innerHTML=`<div class="top">${crest(30)}
    <div class="t">SUMMER FLAME<small>STAFF CODE</small></div>
    <div class="role">STAFF</div></div><div class="wrap">${inner}</div>`;
}

function renderPicker(preselect){
  const groups=FF_COUNTRIES.map(c=>`<div class="country">
    <div class="chead">${ffFlag(c.code)}<span class="clabel">${c.label}</span><span class="cname">${c.name}</span></div>
    ${c.venues.map(v=>`<div class="venue ${v.id===preselect?"sel":""}" data-id="${v.id}">
      <div><div class="vn">${esc(v.name)}</div><div class="vc">${esc(v.city)}</div></div><div class="radio"></div></div>`).join("")}
  </div>`).join("");
  shell(`<div class="pk"><h2>Choose your arcade</h2>
    <p>Pick your arcade for today. The code is valid only for the selected arcade.</p>
    ${groups}<button class="btn" id="ok" ${preselect?"":"disabled"}>Show today's code</button></div>`);
  let chosen=preselect||null;
  document.querySelectorAll(".venue").forEach(v=>v.onclick=()=>{
    document.querySelectorAll(".venue").forEach(x=>x.classList.remove("sel"));
    v.classList.add("sel"); chosen=v.dataset.id; el("ok").disabled=false;
  });
  el("ok").onclick=()=>{ if(!chosen) return; saveVenue(chosen); renderCode(chosen); };
}

function renderCode(venueId){
  const v=ffVenueById(venueId);
  if(!v){ renderPicker(null); return; }
  const now=new Date();
  const dateStr=`${EN_DOW[now.getDay()]}, ${EN_MON[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  const code=ffDailyCode(venueId, ffToday());
  shell(`
    <div class="venue-line">${ffFlag(v.country)} <b>${esc(v.name)}</b> · ${esc(v.city)}</div>
    <div class="date-line">${dateStr}</div>
    <div class="code-card">
      <div class="code-lbl">Today's code</div>
      <div class="code">${code}</div>
      <div class="code-help">This code is valid <b>only today</b> and <b>only for this arcade</b>.</div>
    </div>
    <div class="instr">
      <h3>How to confirm a visit</h3>
      <ol>
        <li>The player hands you <b>their own</b> phone with the Summer Flame app open.</li>
        <li>Type <b>${code}</b> into the code field and confirm.</li>
        <li>The stamp appears instantly. Hand the phone back.</li>
      </ol>
    </div>
    <div class="midnight">🕛 The code changes automatically every day at midnight.</div>
    <button class="change" id="chg">Change arcade</button>
  `);
  el("chg").onclick=()=>renderPicker(venueId);

  // auto-osvježi kad prijeđe ponoć (ili kad se app vrati u prvi plan)
  scheduleMidnight(venueId);
}

let midnightT=null;
function scheduleMidnight(venueId){
  clearTimeout(midnightT);
  const now=new Date();
  const next=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,3);
  midnightT=setTimeout(()=>{ if(loadVenue()===venueId) renderCode(venueId); }, next-now);
}
document.addEventListener("visibilitychange",()=>{ if(!document.hidden){ const v=loadVenue(); if(v) renderCode(v); }});

// boot
(function(){ const v=loadVenue(); if(v && ffVenueById(v)) renderCode(v); else renderPicker(v); })();
</script>
</body>
</html>
